<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3Engine | Autonomous Scaling Protocol</title>
    <style>
        :root { --main-color: #00ff00; --bg-color: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Feature 3 & 4: Binary Pulse & Matrix Canvas */
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .dna-pulse { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: rgba(0, 255, 0, 0.3); animation: pulse 2s infinite; pointer-events: none; }
        @keyframes pulse { 0% { opacity: 0.1; } 50% { opacity: 0.6; } 100% { opacity: 0.1; } }

        /* Feature 1: Terminal Interface */
        .terminal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 900px; background: rgba(0, 0, 0, 0.85); border: 1px solid #222; padding: 30px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.1); border-radius: 5px; }
        .header { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; font-size: 0.8rem; color: #555; display: flex; justify-content: space-between; }
        .line { margin: 8px 0; line-height: 1.4; }
        .cmd { color: #fff; font-weight: bold; }
        
        /* Feature 2: 21M Ticker */
        .ticker-wrap { font-size: 1.5rem; margin: 20px 0; border-left: 3px solid var(--main-color); padding-left: 15px; }
        .cursor { display: inline-block; width: 10px; height: 18px; background: var(--main-color); animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="dna-pulse">DNA_KEY: 01001001011101000111001101001101010100100101100000110011</div>

    <div class="terminal">
        <div class="header">
            <span>X3Engine System v1.0.4</span>
            <span>OS: Solana_Autonomous_Core</span>
        </div>
        <div class="line"><span class="cmd">root@X3Engine:~$</span> init_protocol --force</div>
        <div class="line">Booting sequence... <span style="color:white">[OK]</span></div>
        <div class="line">Identity verification: <span style="color:white">ItsMRX3 detected</span></div>
        
        <div class="ticker-wrap">
            Supply_Status: <span id="ticker">0</span> / 21,000,000
        </div>

        <div class="line" id="typewriter"></div>
        <div class="line"><span class="cmd">root@X3Engine:~$</span> <span class="cursor"></span></div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = "01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }

        // 21M Ticker
        let count = 0;
        const target = 21000000;
        function updateTicker() {
            if (count < target) {
                count += Math.floor(Math.random() * 500000);
                if (count > target) count = target;
                document.getElementById('ticker').innerText = count.toLocaleString();
                setTimeout(updateTicker, 30);
            }
        }

        // Typewriter CLI
        const terminalText = "Protocol initialized. Autonomous scaling activated. 365-day countdown synchronized. No masters. No inflation. Only math.";
        let charIndex = 0;
        function typeCLI() {
            if (charIndex < terminalText.length) {
                document.getElementById("typewriter").innerHTML += terminalText.charAt(charIndex);
                charIndex++;
                setTimeout(typeCLI, 40);
            }
        }

        window.onload = () => {
            setInterval(drawMatrix, 50);
            updateTicker();
            setTimeout(typeCLI, 1000);
        };
    </script>
</body>
</html>
