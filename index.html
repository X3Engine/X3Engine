<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3Engine | Autonomous Protocol</title>
    <style>
        :root { --glow-color: #00ff41; --bg-color: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--glow-color); font-family: 'Courier New', monospace; overflow: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -2; opacity: 0.1; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); z-index: 10; background-size: 100% 2px; pointer-events: none; }
        .terminal { position: relative; z-index: 5; width: 90%; max-width: 900px; height: 80vh; margin: 5vh auto; background: rgba(0, 0, 0, 0.9); border: 1px solid #111; padding: 30px; overflow-y: auto; scrollbar-width: none; }
        .terminal::-webkit-scrollbar { display: none; }
        .header { color: #444; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .line { margin-bottom: 8px; font-size: 1.1rem; line-height: 1.4; }
        .prompt { color: #fff; font-weight: bold; margin-right: 10px; }
        .user-input-area { display: flex; align-items: center; width: 100%; }
        #user-in { background: transparent; border: none; color: var(--glow-color); font-family: inherit; font-size: 1.1rem; outline: none; width: 100%; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: var(--glow-color); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .hex-reply { color: #fff; opacity: 0.7; font-size: 0.9rem; padding-left: 20px; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>

    <div class="terminal" id="terminal">
        <div class="header">
            <span>Kernel: X3_AUTO_V2</span>
            <span>Signature: 0x4974734D525833</span>
        </div>
        <div id="history"></div>
        <div class="user-input-area" id="input-line" style="display:none;">
            <span class="prompt">root@X3Engine:~$</span>
            <input type="text" id="user-in" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "01"; const fontSize = 14; const columns = canvas.width / fontSize;
        const rainDrops = Array.from({ length: columns }).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
            rainDrops.forEach((y, i) => {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // Terminal Logic
        const history = document.getElementById("history");
        const inputLine = document.getElementById("input-line");
        const userInput = document.getElementById("user-in");

        const initLines = [
            "Booting X3Engine Protocol...",
            "Decrypting 0x4974734D525833...",
            "System: ONLINE [DAY 1]",
            "Type something to encrypt..."
        ];

        let lineIdx = 0;
        function typeInit() {
            if (lineIdx < initLines.length) {
                const p = document.createElement("div");
                p.className = "line";
                p.innerHTML = `<span class="prompt">></span> ${initLines[lineIdx]}`;
                history.appendChild(p);
                lineIdx++;
                setTimeout(typeInit, 600);
            } else {
                inputLine.style.display = "flex";
                userInput.focus();
            }
        }
        typeInit();

        // Input Handling
        userInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const val = this.value;
                if (!val) return;

                // Add User Command to History
                const userLine = document.createElement("div");
                userLine.className = "line";
                userLine.innerHTML = `<span class="prompt">root@X3Engine:~$</span> ${val}`;
                history.appendChild(userLine);

                // Process Response (Convert to HEX)
                const hex = Array.from(val).map(c => c.charCodeAt(0).toString(16).toUpperCase()).join("");
                const reply = document.createElement("div");
                reply.className = "line hex-reply";
                reply.innerHTML = `[ENC_REPLY]: 0x${hex} | Status: Synchronized`;
                history.appendChild(reply);

                this.value = "";
                document.getElementById("terminal").scrollTop = document.getElementById("terminal").scrollHeight;
            }
        });

        // Refocus input on click
        document.addEventListener("click", () => userInput.focus());
    </script>
</body>
</html>
